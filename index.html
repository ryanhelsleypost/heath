<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heath</title>
<link rel="icon" href="data:,">
<meta name="theme-color" content="#0e0f0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Heath">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0f0e; --surface:#161817; --surface2:#1e201e;
  --border:#2a2d2a; --border2:#333633;
  --green:#4ade80; --green-dim:#22543d;
  --red:#f87171; --red-dim:#7f1d1d;
  --amber:#fbbf24; --amber-dim:#78350f;
  --blue:#60a5fa; --blue-dim:#1e3a5f;
  --text:#f5f7f5; --text-mid:#bcc4bc; --text-dim:#7f8c7f;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:15px;line-height:1.5;}
/* Header */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 20px;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.app-title{font-size:12px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;}
.bal-wrap{display:flex;align-items:center;gap:8px;margin-top:2px;}
.bal-side{display:flex;flex-direction:column;gap:5px;margin-left:12px;padding-left:14px;border-left:1px solid var(--border2);}
.bal-side .stat-val{font-size:14px;}
.bal-lbl{font-size:12px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
.bal-display{font-size:32px;font-weight:600;color:var(--green);cursor:pointer;border-bottom:1px dashed var(--green-dim);}
.bal-input{font-family:var(--mono);font-size:32px;font-weight:600;color:var(--green);background:transparent;border:none;border-bottom:1px solid var(--green);outline:none;width:180px;}
.hdr-stats{display:flex;gap:20px;margin-top:6px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-lbl{font-size:11px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;}
.stat-val{font-size:15px;font-weight:600;}
.stat-val.pos{color:var(--green);} .stat-val.neg{color:var(--red);} .stat-val.amber{color:var(--amber);} .stat-val.neu{color:var(--text-mid);}
.hdr-actions{display:flex;gap:8px;align-items:center;padding-top:4px;}
/* Buttons */
.btn{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.06em;padding:5px 11px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-mid);cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--text-dim);color:var(--text);}
.btn.primary{border-color:var(--green-dim);color:var(--green);background:#0d2218;}
.btn.primary:hover{background:#0f2d1d;border-color:var(--green);}
.btn.danger{border-color:var(--red-dim);color:var(--red);background:#1f0a0a;}
.btn.danger:hover{background:#2a0d0d;}
.btn.sm{padding:3px 8px;font-size:12px;}
/* Tabs */
.tab-bar{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.tab-btn{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.tab-btn:hover:not(.active){color:var(--text-mid);}
/* Main wrapper */
.main-wrap{max-width:780px;margin:0 auto;padding:16px 16px 80px;}
#timeline-strip-wrap{width:calc(100% + 40px);margin:10px -20px -12px;background:var(--bg);border-top:1px solid var(--border);padding-bottom:1px;}
.add-grid{display:grid;grid-template-columns:1fr 120px auto;gap:8px;align-items:end;}
.add-grid.bill{grid-template-columns:1fr 110px 70px auto;}

/* ═══ MOBILE (phones) ═══ */
@media (max-width:640px){
  /* prevent iOS auto-zoom when focusing inputs */
  input,select,textarea{font-size:16px !important;}
  .hdr{padding:10px 12px;}
  #timeline-strip-wrap{width:calc(100% + 24px);margin:8px -12px -10px;}
  .app-title{font-size:11px;letter-spacing:.08em;}
  .bal-display,.bal-input{font-size:26px;}
  .bal-input{width:140px;}
  .bal-side{margin-left:8px;padding-left:10px;gap:3px;}
  .bal-side .stat-val{font-size:13px;}
  .hdr-stats{gap:14px;margin-top:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;width:100%;}
  .hdr-stats .stat{flex-shrink:0;}
  .stat-val{font-size:14px;}
  .stat-lbl{font-size:10px;white-space:nowrap;}
  .hdr-actions{position:absolute;top:8px;right:10px;padding:0;width:auto;}
  .hdr-actions .btn{flex:none;padding:7px 12px;font-size:14px;}
  .main-wrap{padding:12px 8px 80px;}
  .tab-bar{width:100%;}
  .tab-btn{flex:1;padding:10px 8px;}
  .period-hdr{padding:11px 10px;}
  .bill-row{padding:9px 6px;gap:6px;}
  .bill-day{width:20px;font-size:11px;}
  .bill-name{font-size:13px;}
  .bill-amt{font-size:13px;min-width:52px;flex-shrink:0;}
  .bill-acts{opacity:1;gap:5px;}
  .act-btn{font-size:17px;padding:6px 8px;min-width:34px;text-align:center;}
  .status-btn{width:30px;height:30px;font-size:14px;flex-shrink:0;}
  .btn.sm{padding:6px 10px;}
  .add-grid,.add-grid.bill{grid-template-columns:1fr 1fr;}
  .add-grid > div:first-child{grid-column:1/-1;}
  .modal-backdrop{padding:14px 8px;}
  .modal{padding:16px;border-radius:10px;}
  .dc-card-hdr{padding:12px 10px;}
}
/* Periods */
.period{margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.period.active{border-color:var(--green-dim);box-shadow:0 0 0 1px var(--green-dim);}
.period.future{opacity:.78;}
.period.past{opacity:.5;filter:saturate(.35);transition:opacity .2s,filter .2s;}
.period.past:hover{opacity:.75;}
.period.past:hover{opacity:.35;filter:saturate(.3);pointer-events:auto;}
.period.past .period-hdr{cursor:default;}
.period-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface);cursor:pointer;user-select:none;}
.period.active .period-hdr{background:#0d2218;}
.period-badge{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--green-dim);color:var(--green);}
.period-dates{font-size:13px;font-weight:600;color:var(--text-mid);flex:1;}
.period.active .period-dates{color:var(--green);}
.period-income{font-size:14px;font-weight:600;color:var(--green);}
.period-end{font-size:14px;font-weight:600;margin-left:4px;}
.period-end.pos{color:var(--green);} .period-end.neg{color:var(--red);} .period-end.tight{color:var(--amber);}
.period-toggle{font-size:12px;color:var(--text-dim);transition:transform .2s;}
.period.open .period-toggle{transform:rotate(180deg);}
.period-body{display:none;}
.period.open .period-body{display:block;}
/* Bill rows */
.bill-row{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid var(--border);transition:background .12s;}
.bill-row:hover{background:var(--surface2);}
.bill-row.cleared{opacity:.32;}
.bill-row.vacation{border-left:2px solid #22c55e;}
.bill-row.seasonal{border-left:2px solid var(--blue);}
.bill-row.sec-hdr{background:var(--surface);cursor:default;}
.bill-row.sec-hdr:hover{background:var(--surface);}
.status-btn{width:22px;height:22px;border-radius:3px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono);color:var(--text-dim);transition:all .12s;}
.status-btn.pending{border-color:var(--amber);background:var(--amber-dim);color:var(--amber);}
.status-btn.cleared{border-color:var(--green-dim);background:var(--green-dim);color:var(--green);}
.bill-day{font-size:12px;color:var(--text-dim);width:24px;flex-shrink:0;text-align:right;}
.bill-name{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bill-name.struck{color:var(--text-dim);text-decoration:line-through;}
.bill-name a.bill-link{color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue-dim);}
.bill-name a.bill-link:hover{border-bottom-color:var(--blue);}
.bill-name.struck a.bill-link{color:var(--text-dim);text-decoration:line-through;border-bottom:none;}
.bill-amt{font-size:14px;font-weight:500;min-width:68px;text-align:right;}
.bill-amt.out{color:var(--red);} .bill-amt.in{color:var(--green);} .bill-amt.vac{color:#4ade80;} .bill-amt.dim{color:var(--text-dim);}
.bill-acts{display:flex;gap:5px;opacity:1;}
.act-btn{font-size:16px;line-height:1;padding:5px 7px;border:none;border-radius:6px;background:transparent;cursor:pointer;opacity:1;-webkit-tap-highlight-color:transparent;}
.act-btn:active{background:var(--hover);}
.act-btn.del{opacity:.55;}
.act-btn.del:active{opacity:1;}
.sec-lbl{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);font-weight:600;}
.add-input{font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--border2);border-radius:3px;color:var(--text);padding:4px 8px;outline:none;flex:1;}
.add-input:focus{border-color:var(--text-dim);}
.add-input::placeholder{color:var(--text-dim);}
.period-footer{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface);}
/* Debt Collector */
.dc-stat-row{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap;padding:12px 14px;background:var(--surface);border-radius:6px;border:1px solid var(--border);}
.dc-avalanche{font-size:12px;color:var(--text-dim);margin-bottom:12px;padding:8px 12px;background:var(--surface);border-radius:5px;border:1px solid var(--border);}
.dc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.dc-card.maxed{border-color:var(--red-dim);}
.dc-card.high{border-color:var(--amber-dim);}
.dc-card-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;}
.dc-card-hdr:hover{background:var(--surface2);}
.dc-card-name{font-size:15px;font-weight:600;flex:1;}
.dc-int{font-size:13px;color:var(--amber);white-space:nowrap;}
.dc-util{font-size:12px;padding:2px 7px;border-radius:3px;font-weight:700;}
.dc-util.maxed{background:var(--red-dim);color:var(--red);}
.dc-util.high{background:var(--amber-dim);color:var(--amber);}
.dc-util.ok{background:var(--green-dim);color:var(--green);}
.dc-bal{font-size:16px;font-weight:600;color:var(--red);}
.dc-bar-wrap{height:4px;background:var(--border2);border-radius:0;}
.dc-bar-fill{height:100%;transition:width .3s;}
.dc-body{display:none;border-top:1px solid var(--border);padding:14px 16px;}
.dc-card.open .dc-body{display:block;}
.dc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.dc-field{display:flex;flex-direction:column;gap:3px;}
.dc-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.dc-val{font-size:15px;font-weight:500;}
.dc-input{font-family:var(--mono);font-size:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--text);padding:5px 8px;outline:none;width:100%;}
.dc-input:focus{border-color:var(--text-mid);}
.dc-proj{background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:10px 12px;margin-bottom:12px;font-size:14px;}
.dc-actions{display:flex;gap:8px;flex-wrap:wrap;}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:48px 16px;overflow-y:auto;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:100%;max-width:480px;padding:22px;}
.modal.sm{max-width:360px;}
.modal h2{font-size:15px;font-weight:600;margin-bottom:18px;letter-spacing:.04em;}
.m-lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:block;}
.m-input{font-family:var(--mono);font-size:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--text);padding:7px 10px;outline:none;width:100%;margin-bottom:10px;}
.m-input:focus{border-color:var(--text-mid);}
.m-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.trow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="app-title"><span id="app-title-text">Heath</span> <span id="sync-dot" title="Sync off — click ☁ Sync to set up" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text-dim);margin-left:6px;vertical-align:middle;cursor:pointer;" onclick="openSyncModal()"></span></div>
      <div class="bal-wrap">
        <div class="bal-lbl">Balance</div>
        <div id="bal-display" class="bal-display" onclick="editBal()">$0</div>
        <input id="bal-input" class="bal-input" type="text" style="display:none"
          onblur="saveBal()" onkeydown="if(event.key==='Enter')saveBal()">
        <div id="bal-side" class="bal-side"></div>
      </div>
    </div>
    <div id="hdr-stats" class="hdr-stats"></div>
    <div class="hdr-actions">
      <button class="btn" onclick="openManage()" title="Settings — bills, sync, import/export">⚙</button>
    </div>
  </div>
  <div id="timeline-strip-wrap"></div>
</div>

<div class="main-wrap">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-periods" onclick="setTab('periods')">Pay Periods</button>
    <button class="tab-btn" id="tab-btn-debt" onclick="setTab('debt')">💀 Debt Collector</button>
  </div>
  <div id="tab-periods"></div>
  <div id="tab-debt" style="display:none"></div>
</div>
<div id="modal-root"></div>

<script>
const STORAGE_KEY = 'ledger_v2';
const DC_KEY = 'ledger_dc_v1';

// ═══ TEMPLATES ═══
// ═══ SEED DATA — intentionally empty ═══
// The public app starts fully zeroed. All real data lives in each
// user's own browser storage and (if configured) their cloud sync.
const DEFAULT_TEMPLATES = [];

// ═══ STATE ═══
let S = {balance:0, templates:DEFAULT_TEMPLATES.map(t=>({...t})), periods:[]};
let DC = {cards:[], tab:'periods'};

function uid() { return Math.random().toString(36).slice(2,9); }
function fmtD(n) { return '$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0}); }

var _statDropdown = null;
function buildStatDropdown(type, periodIdxs) {
  if (!periodIdxs.length || _statDropdown !== type) return null;
  const bals = getRunningBals();
  var items = periodIdxs.map(function(i) {
    var p = S.periods[i];
    var endBal = bals[i] ? bals[i].end : null; // end balance for this period
    var isNeg = endBal !== null && endBal < 0;
    var col = isNeg ? 'var(--red)' : 'var(--amber)';
    var bg  = isNeg ? 'rgba(127,29,29,.3)' : 'transparent';
    var label = endBal !== null ? (isNeg ? '−'+fmtD(endBal) : fmtD(endBal)) : '?';
    var negAttr = isNeg ? '1' : '0';
    return '<div class="sd-item" data-pid="'+p.id+'" data-neg="'+negAttr+'" data-bg="'+bg+'"'
      +' onclick="jumpToPeriod(event,this.dataset.pid)"'
      +' onmouseover="sdHover(this,true)" onmouseout="sdHover(this,false)"'
      +' style="display:flex;justify-content:space-between;align-items:center;gap:16px;padding:8px 10px;cursor:pointer;border-radius:4px;background:'+bg+';">'
      +'<span style="display:flex;flex-direction:column;gap:1px;">'
        +'<span>'+fmtDs(p.startDate)+' – '+fmtDs(p.endDate)+'</span>'
        +'<span style="font-size:11px;color:var(--text-dim);letter-spacing:.06em;">PROJECTED END BALANCE</span>'
      +'</span>'
      +'<span style="font-weight:700;font-size:17px;color:'+col+';">'+label+'</span>'
      +'</div>';
  }).join('');
  var wrap = document.createElement('div');
  wrap.addEventListener('click', function(e){ e.stopPropagation(); });
  wrap.style.cssText = 'position:fixed;z-index:500;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:6px;min-width:260px;max-width:calc(100vw - 16px);max-height:60vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);';
  wrap.innerHTML = '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:2px 4px 8px;">↓ Click to jump</div>' + items;
  // Anchor below the host stat once in the DOM — fixed positioning escapes the
  // stats row's horizontal-scroll clipping on mobile.
  requestAnimationFrame(function(){
    var host=wrap.parentElement;if(!host)return;
    var r=host.getBoundingClientRect();
    wrap.style.top=(r.bottom+6)+'px';
    wrap.style.left=Math.max(8,Math.min(r.left,window.innerWidth-wrap.offsetWidth-8))+'px';
  });
  return wrap;
}
function toggleStatDropdown(type) {
  _statDropdown = _statDropdown === type ? null : type;
  renderHeader();
}
// Close the stat dropdown when clicking anywhere outside of it
document.addEventListener('click', function() {
  if (_statDropdown) { _statDropdown = null; renderHeader(); }
});
function jumpToPeriod(ev, id) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  _statDropdown = null;

  // Switch tab if needed
  if (DC.tab !== 'periods') {
    setTab('periods');
  }

  // Open the target period
  const p = S.periods.find(pp => pp.id === id);
  if (p) p.open = true;
  persist();

  // Rebuild the periods list (not the full render — avoid wiping the header mid-click)
  renderPeriods();
  renderHeader();

  // Wait one frame for DOM to settle, then scroll + flash
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      const el = document.getElementById('pd-' + id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.style.transition = 'box-shadow .15s';
        el.style.boxShadow = '0 0 0 3px var(--amber)';
        setTimeout(function() { el.style.boxShadow = ''; }, 1400);
      }
    });
  });
}
function sdHover(el, over) {
  var isNeg = el.dataset.neg === '1';
  el.style.background = over ? (isNeg ? 'rgba(127,29,29,.5)' : 'var(--surface2)') : el.dataset.bg;
}
function fmtDs(s) { const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function parseDollars(s) { const v=parseFloat(String(s||'').replace(/[^0-9.-]/g,'')); return isNaN(v)?0:v; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.toISOString().split('T')[0];}

function periodAddlTotal(p) { return (p.additionalIncome||[]).reduce((s,a)=>s+(a.status==='cleared'?0:a.amount),0); }
function periodIncomeTotal(p) { return (p.incomeCleared?0:p.income)+periodAddlTotal(p); }
function periodBillsTotal(p) { return p.bills.reduce((s,b)=>s+(b.status==='cleared'?0:b.amount),0); }

function billDueInPeriod(day,s,e) {
  if (day===null) return true;
  const sd=new Date(s+'T00:00:00'), ed=new Date(e+'T00:00:00');
  let d=new Date(sd.getFullYear(),sd.getMonth(),day);
  if (d<sd) d=new Date(sd.getFullYear(),sd.getMonth()+1,day);
  return d>=sd && d<=ed;
}

// ═══ MISPLACED BILL AUDIT ═══
// For a bill's due day, find the nearest real calendar date relative to the period it's sitting in
function nearestDueDate(day,p){
  var sd=new Date(p.startDate+'T00:00:00'), ed=new Date(p.endDate+'T00:00:00');
  var cands=[];
  for(var m=-1;m<=1;m++){var d=new Date(sd.getFullYear(),sd.getMonth()+m,day);if(d.getDate()===day)cands.push(d);}
  function dist(d){return (d>=sd&&d<=ed)?0:(d<sd?sd-d:d-ed);}
  cands.sort(function(a,b){return dist(a)-dist(b);});
  return cands[0]||null;
}
function findMisplacedBills(){
  var out=[];var activeIdx=S.periods.findIndex(function(p){return p.active;});
  S.periods.forEach(function(p,i){
    if(i<activeIdx)return; // ignore closed periods
    p.bills.forEach(function(b){
      if(!b.day||b.status==='cleared'||b.keepHere)return; // skip variable-day, cleared, and accepted overrides
      if(billDueInPeriod(b.day,p.startDate,p.endDate))return;
      var due=nearestDueDate(b.day,p);
      var target=null,ti=-1;
      if(due){S.periods.some(function(tp,j){var sd=new Date(tp.startDate+'T00:00:00'),ed=new Date(tp.endDate+'T00:00:00');if(due>=sd&&due<=ed){target=tp;ti=j;return true;}return false;});}
      out.push({pid:p.id,pLabel:fmtDs(p.startDate)+' – '+fmtDs(p.endDate),bid:b.id,b:b,due:due,target:target,ti:ti,activeIdx:activeIdx});
    });
  });
  return out;
}
function openMisplacedModal(){
  var list=findMisplacedBills();
  if(!list.length){closeModal();render();return;}
  var rows=list.map(function(m){
    var b=m.b;
    var dueStr=m.due?m.due.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'?';
    var targetStr='', canMove=false, dupNote='';
    if(m.target&&m.target.id!==m.pid){
      if(m.ti>=m.activeIdx){
        targetStr='<span style="color:var(--green);">'+fmtDs(m.target.startDate)+' – '+fmtDs(m.target.endDate)+'</span>';
        canMove=true;
        if(m.target.bills.some(function(tb){return tb.name===b.name;}))dupNote='<div style="font-size:11px;color:var(--amber);margin-top:2px;">⚠ that period already has a bill named "'+esc(b.name)+'" — moving may create a duplicate</div>';
      } else {
        targetStr='<span style="color:var(--text-dim);">a closed period ('+fmtDs(m.target.startDate)+' – '+fmtDs(m.target.endDate)+')</span>';
      }
    } else {
      targetStr='<span style="color:var(--text-dim);">no matching period found</span>';
    }
    return '<div style="padding:10px 12px;border:1px solid var(--border);border-radius:5px;margin-bottom:8px;background:var(--surface2);">'+
      '<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">'+
        '<span style="font-weight:600;">'+esc(b.name)+'</span>'+
        '<span style="color:var(--red);">-'+fmtD(b.amount)+'</span>'+
        '<span style="color:var(--text-dim);font-size:12px;">due day '+b.day+' ('+dueStr+')</span>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--text-mid);margin-top:3px;">Sitting in: <span style="color:var(--amber);">'+m.pLabel+'</span> &nbsp;·&nbsp; Belongs in: '+targetStr+'</div>'+
      dupNote+
      '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">'+
        (canMove?'<button class="btn sm primary" data-pid="'+m.pid+'" data-bid="'+m.bid+'" onclick="mbMove(this.dataset.pid,this.dataset.bid)">→ Move to correct period</button>':'')+
        '<button class="btn sm" data-pid="'+m.pid+'" data-bid="'+m.bid+'" title="Accept this placement — it won\'t be flagged again" onclick="mbKeep(this.dataset.pid,this.dataset.bid)">✓ Keep here</button>'+
        '<button class="btn sm danger" data-pid="'+m.pid+'" data-bid="'+m.bid+'" onclick="mbDel(this.dataset.pid,this.dataset.bid)">🗑️</button>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">'+
      '<div class="modal"><h2>⚠ Misplaced Bills ('+list.length+')</h2>'+
      '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">These bills have a due day that doesn\'t fall inside the pay period they\'re sitting in. Move them to where they belong, keep them where they are (won\'t be flagged again), or delete them.</div>'+
      rows+
      '<div class="m-actions"><button class="btn" onclick="closeModal()">Close</button></div>'+
    '</div></div>';
}
function mbMove(pid,bid){
  var list=findMisplacedBills();
  var m=list.find(function(x){return x.pid===pid&&x.bid===bid;});
  if(!m||!m.target){openMisplacedModal();return;}
  var p=S.periods.find(function(pp){return pp.id===pid;});
  var bi=p?p.bills.findIndex(function(bb){return bb.id===bid;}):-1;
  if(bi>-1){
    var b=p.bills[bi];
    m.target.bills.push(b); // same object — keeps status, url, autopay, etc.
    m.target.bills.sort(function(a,c){return (a.day||99)-(c.day||99);});
    p.bills.splice(bi,1);
    persist();
  }
  render();openMisplacedModal();
}
function mbKeep(pid,bid){
  var p=S.periods.find(function(pp){return pp.id===pid;});
  var b=p&&p.bills.find(function(bb){return bb.id===bid;});
  if(b){b.keepHere=true;persist();}
  render();openMisplacedModal();
}
function mbDel(pid,bid){
  var p=S.periods.find(function(pp){return pp.id===pid;});
  if(p){p.bills=p.bills.filter(function(bb){return bb.id!==bid;});persist();}
  render();openMisplacedModal();
}

function buildBillsForPeriod(p) {
  const bills = [];
  (S.templates||[]).forEach(function(t) {
    if (billDueInPeriod(t.day, p.startDate, p.endDate)) {
      bills.push({id:uid(),templateId:t.id,name:t.name,amount:t.amount,day:t.day,status:t.autopay?'pending':'upcoming',category:t.category||'fixed',tag:'',url:t.url||'',autopay:!!t.autopay});
    }
  });
  bills.sort((a,b)=>(a.day||99)-(b.day||99));
  return bills;
}

function genPeriods(count) {
  const periods = [];
  let d = new Date(); d.setHours(0,0,0,0);
  for (let i=0;i<count;i++) {
    const start = fmtDate(d), end = fmtDate(addDays(d,13));
    periods.push({
      id:'p'+start.replace(/-/g,''), startDate:start, endDate:end,
      income: 0,
      additionalIncome: [],
      bills:[], open:i===0, active:i===0,
    });
    d=addDays(d,14);
  }
  return periods;
}

function initPeriods() {
  S.periods = genPeriods(60);
  S.periods.forEach(p=>{p.bills=buildBillsForPeriod(p);});
  persist();
}

// ═══ STORAGE ═══
function persist() { localStorage.setItem(STORAGE_KEY,JSON.stringify({balance:S.balance,templates:S.templates,periods:S.periods,subtitle:S.subtitle||''})); }
function dcPersist() { localStorage.setItem(DC_KEY,JSON.stringify({cards:DC.cards})); }

function loadStorage() {
  try {
    const r=localStorage.getItem(STORAGE_KEY);
    if (r) { const d=JSON.parse(r); if(d.balance!==undefined)S.balance=d.balance; if(d.templates)S.templates=d.templates; if(d.periods&&d.periods.length)S.periods=d.periods; if(d.subtitle)S.subtitle=d.subtitle; }
  } catch(e) {}
  if (!S.periods.length) initPeriods();
  try {
    const r=localStorage.getItem(DC_KEY);
    if (r) { const d=JSON.parse(r); if(d.cards)DC.cards=d.cards; }
  } catch(e) {}
}

// ═══ RUNNING BALANCES ═══
function getRunningBals() {
  const activeIdx = S.periods.findIndex(p=>p.active);
  // Returns {start, end} per period. Cleared income/bills excluded from totals.
  const bals=[];
  let bal=S.balance;
  S.periods.forEach((p,i)=>{
    if (i<activeIdx){bals.push(null);return;}
    var startBal = i===activeIdx ? bal : (bals[i-1]!==null ? bals[i-1].end : bal);
    var endBal   = startBal + periodIncomeTotal(p) - periodBillsTotal(p);
    bals.push({start:startBal, end:endBal});
  });
  return bals;
}
function activeEndBal() {
  const p=S.periods.find(pp=>pp.active);
  if(!p)return null;
  return S.balance+periodIncomeTotal(p)-periodBillsTotal(p);
}

// ═══ RENDER ═══

  _statDropdown = null;
  DC.tab=tab;
  document.getElementById('tab-btn-periods').className='tab-btn'+(tab==='periods'?' active':'');
  document.getElementById('tab-btn-debt').className='tab-btn'+(tab==='debt'?' active':'');
  document.getElementById('tab-periods').style.display=tab==='periods'?'':'none';
  document.getElementById('tab-debt').style.display=tab==='debt'?'':'none';
  if(tab==='debt') renderDebt();
}

function render() { renderHeader(); renderTimeline(); renderPeriods(); if(S.ui_manage) renderModal(); }
function renderTimeline() {
  var wrap = document.getElementById('timeline-strip-wrap');
  if (!wrap) return;
  var bals = getRunningBals();
  var activeIdx = S.periods.findIndex(function(p){ return p.active; });
  var display = [];
  S.periods.forEach(function(p, i) {
    if (i < activeIdx) return;
    var b = bals[i]; if (!b) return;
    display.push({ p: p, end: b.end });
  });
  function fillFor(v) {
    if (v < 0)    return '#f87171';
    if (v < 500)  return '#fbbf24';
    if (v < 1000) return '#d97706';
    if (v < 2500) return '#4ade80';
    return '#86efac';
  }
  var segsHtml = display.map(function(d) {
    var fill = fillFor(d.end);
    var hasVac = d.p.bills && d.p.bills.some(function(b){ return b.tag==='vacation'; });
    var isActive = d.p.active;
    var tip = fmtDs(d.p.startDate)+' – '+fmtDs(d.p.endDate)+': '+fmtD(d.end);
    return '<div data-pid="'+d.p.id+'" onclick="jumpToPeriod(event,this.dataset.pid)" title="'+tip+'" style="'+
      'flex:1;min-width:0;height:100%;cursor:pointer;'+
      'background:'+fill+';opacity:'+(isActive?'1':'0.7')+';'+
      (isActive?'box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);':'')+
      (hasVac?'background:repeating-linear-gradient(45deg,'+fill+','+fill+' 3px,rgba(96,165,250,.5) 3px,rgba(96,165,250,.5) 6px);':'')+
    '"></div>';
  }).join('');
  wrap.innerHTML = '<div style="display:flex;width:100%;height:20px;gap:1px;overflow:hidden;">'+segsHtml+'</div>';
}

function renderHeader() {
  const projEnd=activeEndBal();
  // Period Δ = whole-period plan: ALL income minus ALL bills for the active period,
  // regardless of received/cleared status — so checking things off never moves it.
  const _ap=S.periods.find(pp=>pp.active);
  const diff=_ap?(( _ap.income||0)+(_ap.additionalIncome||[]).reduce((s,a)=>s+(a.amount||0),0)-_ap.bills.reduce((s,b)=>s+(b.amount||0),0)):0;
  document.getElementById('bal-display').textContent='$'+S.balance.toLocaleString('en-US',{maximumFractionDigits:0});
  const bals=getRunningBals();
  let negCount=0,warnCount=0,tightCount=0;
  const ai=S.periods.findIndex(p=>p.active);
  bals.forEach(function(b,i){
    if(i<=ai||b===null)return;
    if(b&&b.end<0)negCount++;
    if(b&&b.end<500)warnCount++;          // includes negatives
    else if(b&&b.end<1000)tightCount++;   // $500–$999 only
  });
  // Build lists of affected period ids
  var negPeriods = [], warnPeriods = [], tightPeriods = [];
  bals.forEach(function(b,i) {
    if (i <= ai || b === null) return;
    if (b && b.end < 0) negPeriods.push(i);
    if (b && b.end < 500) warnPeriods.push(i);          // includes negatives
    else if (b && b.end < 1000) tightPeriods.push(i);   // $500–$999 only
  });

  // Build stats using DOM manipulation to avoid quote issues
  var statsEl = document.getElementById('hdr-stats');
  statsEl.innerHTML = '';
  function makeStat(lbl, val, cls, clickFn, title) {
    var d = document.createElement('div');
    d.className = 'stat';
    if (clickFn) { d.style.cursor='pointer'; d.style.position='relative'; d.title=title||''; d.addEventListener('click', clickFn); }
    d.innerHTML = '<div class="stat-lbl">'+lbl+'</div><div class="stat-val '+cls+'">'+val+'</div>';
    return d;
  }
  // Stacked stats beside the balance: Period Δ on top, Period End on bottom
  var titleEl = document.getElementById('app-title-text');
  if (titleEl) titleEl.textContent = 'Heath' + (S.subtitle ? ' — ' + S.subtitle : '');
  var sideEl = document.getElementById('bal-side');
  if (sideEl) {
    sideEl.innerHTML =
      '<div class="stat" title="Whole-period surplus or deficit: all income this period minus all bills, regardless of what\'s been received or cleared. Checking things off never moves this number."><div class="stat-lbl">Period Δ</div><div class="stat-val '+(diff>=0?'pos':'neg')+'">'+(diff>=0?'+':'−')+fmtD(diff)+'</div></div>'+
      '<div class="stat" title="Where your balance is projected to land at the end of the current pay period."><div class="stat-lbl">Period End</div><div class="stat-val '+(projEnd>=0?'pos':'neg')+'">'+fmtD(projEnd)+'</div></div>';
  }
  // Negative periods stat
  var negStat = makeStat('< $0', negCount+' period'+(negCount!==1?'s':'')+(negCount>0?' ▾':''), negCount>0?'neg':'pos', negCount>0?function(ev){ev.stopPropagation();toggleStatDropdown('neg');}:null, 'Periods projected to end below $0 — click to see them');
  if (negCount>0) {
    var negDrop = buildStatDropdown('neg', negPeriods);
    if (negDrop) negStat.appendChild(negDrop);
  }
  statsEl.appendChild(negStat);
  // Warning periods stat
  var warnStat = makeStat('< $500', warnCount+' period'+(warnCount!==1?'s':'')+(warnCount>0?' ▾':''), warnCount>0?'amber':'pos', warnCount>0?function(ev){ev.stopPropagation();toggleStatDropdown('warn');}:null, 'Periods projected to end below $500 — click to see them');
  if (warnCount>0) {
    var warnDrop = buildStatDropdown('warn', warnPeriods);
    if (warnDrop) warnStat.appendChild(warnDrop);
  }
  statsEl.appendChild(warnStat);
  // Tight periods stat ($500–$999)
  var tightStat = makeStat('< $1K', tightCount+' period'+(tightCount!==1?'s':'')+(tightCount>0?' ▾':''), tightCount>0?'amber':'pos', tightCount>0?function(ev){ev.stopPropagation();toggleStatDropdown('tight');}:null, 'Periods projected to end below $1,000 — click to see them');
  if (tightCount>0) {
    var tightDrop = buildStatDropdown('tight', tightPeriods);
    if (tightDrop) tightStat.appendChild(tightDrop);
  }
  statsEl.appendChild(tightStat);
  // Misplaced bills audit
  var misplaced = findMisplacedBills();
  if (misplaced.length > 0) {
    var misStat = makeStat('⚠ MISPLACED', misplaced.length+' bill'+(misplaced.length!==1?'s':'')+' ▸', 'amber',
      function(ev){ ev.stopPropagation(); openMisplacedModal(); },
      'Bills whose due day falls outside the pay period they\'re sitting in — click to review');
    statsEl.appendChild(misStat);
  }
  if (negCount > 0) {
    var note = document.createElement('div');
    note.style.cssText = 'font-size:11px;color:var(--text-dim);margin-top:4px;letter-spacing:.04em;';
    note.textContent = '* includes vacation & trip expenses';
    statsEl.appendChild(note);
  }
}

      : 'CLEARED — payment has cleared the bank and is already reflected in your real balance, so it\'s no longer deducted from projections. Click to reset to Upcoming.';
    return '<div class="bill-row'+(isCl?' cleared':'')+(isVac?' vacation':'')+(isSeas?' seasonal':'')+'">' +
      '<button class="status-btn '+b.status+'" title="'+statusTip+'" onclick="cycleStatus(\''+p.id+'\',\''+b.id+'\')">'+
        (b.status==='upcoming'?'·':b.status==='pending'?'P':'✓')+'</button>'+
      '<div class="bill-day">'+(b.day||'~')+'</div>'+
      '<div class="bill-name'+(isCl?' struck':'')+'">'+(b.url?'<a class="bill-link" href="'+esc(b.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="'+esc(b.url)+'">'+esc(b.name)+' <span style="font-size:11px;">↗</span></a>':esc(b.name))+(b.autopay?'<span style="font-size:11px;color:var(--amber);" title="On Autopay — automatically marked Pending"> ⚡AP</span>':'')+(isRing?'<span style="font-size:11px;color:var(--text-dim);"> 💍</span>':'')+(isCC?'<span style="font-size:11px;color:var(--blue);"> CC</span>':'')+'</div>'+
      '<div class="bill-amt '+(isCl?'dim':isVac?'vac':'out')+'">'+(isCl?'—':'-'+fmtD(b.amount))+'</div>'+
      '<div class="bill-acts"><button class="act-btn" onclick="editBillRow(\''+p.id+'\',\''+b.id+'\')">✏️</button><button class="act-btn del" onclick="delBill(\''+p.id+'\',\''+b.id+'\')">🗑️</button></div></div>';
  }

  if(fixed.length){html+='<div class="bill-row sec-hdr" style="padding:3px 14px;"><div class="sec-lbl" style="font-size:10px;color:var(--text-dim);">FIXED</div></div>';fixed.forEach(b=>html+=billRow(b));}
  if(ring.length){html+='<div class="bill-row sec-hdr" style="padding:3px 14px;"><div class="sec-lbl" style="font-size:10px;color:var(--text-dim);">💍 RING</div></div>';ring.forEach(b=>html+=billRow(b));}
  if(variable.length){html+='<div class="bill-row sec-hdr" style="padding:3px 14px;"><div class="sec-lbl" style="font-size:10px;color:var(--text-dim);">VARIABLE</div></div>';variable.forEach(b=>html+=billRow(b));}
  if(ccpay.length){html+='<div class="bill-row sec-hdr" style="padding:3px 14px;"><div class="sec-lbl" style="font-size:10px;color:var(--blue);">CC PAYMENTS</div></div>';ccpay.forEach(b=>html+=billRow(b));}
  if(vacation.length){html+='<div class="bill-row sec-hdr" style="padding:3px 14px;"><div class="sec-lbl" style="font-size:10px;color:#1a5c1a;">✈ TRIP / VACATION</div></div>';vacation.forEach(b=>html+=billRow(b));}
  if(seasonal.length){html+='<div class="bill-row sec-hdr" style="padding:3px 14px;"><div class="sec-lbl" style="font-size:10px;color:var(--blue-dim);">SEASONAL / ANNUAL</div></div>';seasonal.forEach(b=>html+=billRow(b));}

  // Add bill input
  var showAddBForm = S.ui_addBill === p.id;
  if (!showAddBForm) {
    html += '<div class="bill-row" style="cursor:pointer;" onclick="showAddBillForm(\''+p.id+'\')">' +
      '<div class="status-btn" style="border:none;color:var(--text-dim);font-size:16px;">＋</div>'+
      '<div style="flex:1;font-size:13px;color:var(--text-dim);">Add a bill or expense…</div>'+
    '</div>';
  } else {
    html += '<div style="padding:10px 14px;border-top:1px solid var(--border);background:var(--surface2);">'+
      '<div class="add-grid bill">'+
        '<div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">NAME</div>'+
          '<input class="add-input" id="ab-name-'+p.id+'" placeholder="e.g. Electric" style="width:100%;" onkeydown="if(event.key===\'Enter\')saveAddBill(\''+p.id+'\')"></div>'+
        '<div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">AMOUNT ($)</div>'+
          '<input class="add-input" id="ab-amt-'+p.id+'" type="number" min="0" step="0.01" placeholder="0.00" style="width:100%;" onkeydown="if(event.key===\'Enter\')saveAddBill(\''+p.id+'\')"></div>'+
        '<div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">DUE DAY</div>'+
          '<input class="add-input" id="ab-day-'+p.id+'" type="number" min="1" max="31" placeholder="~" style="width:100%;" onkeydown="if(event.key===\'Enter\')saveAddBill(\''+p.id+'\')"></div>'+
        '<div style="display:flex;gap:6px;padding-bottom:1px;">'+
          '<button class="btn primary sm" data-pid="'+p.id+'" onclick="saveAddBill(this.dataset.pid)">Add</button>'+
          '<button class="btn sm" onclick="S.ui_addBill=null;render()">✕</button>'+
        '</div>'+
      '</div>'+
      '<div style="margin-top:8px;"><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">LINK / URL (OPTIONAL)</div>'+
        '<input class="add-input" id="ab-url-'+p.id+'" type="url" placeholder="https://…" style="width:100%;" onkeydown="if(event.key===\'Enter\')saveAddBill(\''+p.id+'\')"></div>'+
      '<div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:8px;">'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-mid);">'+
        '<input type="checkbox" id="ab-rec-'+p.id+'" style="accent-color:var(--green);width:15px;height:15px;cursor:pointer;">'+
        '<span>↻ Recurring <span style="color:var(--text-dim);font-size:11px;">(this + all future periods)</span></span>'+
      '</label>'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-mid);">'+
        '<input type="checkbox" id="ab-ap-'+p.id+'" style="accent-color:var(--amber);width:15px;height:15px;cursor:pointer;">'+
        '<span>⚡ Autopay <span style="color:var(--text-dim);font-size:11px;">(starts as Pending)</span></span>'+
      '</label>'+
      '</div>'+
    '</div>';
  }

  // Footer
  const uncl=p.bills.filter(b=>b.status!=='cleared').reduce((s,b)=>s+b.amount,0);
  const cl=p.bills.filter(b=>b.status==='cleared').reduce((s,b)=>s+b.amount,0);
  const vacTot=vacation.reduce((s,b)=>s+b.amount,0);
  const projEnd=startBal!==null?startBal+periodIncomeTotal(p)-periodBillsTotal(p):null;
  // ── Period footer ──
  var totalIn  = periodIncomeTotal(p);
  var totalOut = periodBillsTotal(p);
  var isNegEnd  = projEnd !== null && projEnd < 0;
  var isLowEnd  = projEnd !== null && projEnd >= 0 && projEnd < 1000;
  var endColor  = isNegEnd ? 'var(--red)' : isLowEnd ? 'var(--amber)' : 'var(--green)';
  var endBg     = isNegEnd ? 'rgba(127,29,29,.22)' : isLowEnd ? 'rgba(120,53,15,.15)' : 'transparent';
  var endBadge  = isNegEnd
    ? '<div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;background:var(--red);color:#000;">NEGATIVE</div>'
    : isLowEnd
    ? '<div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;background:var(--amber);color:#000;">LOW</div>'
    : '<div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;background:var(--green-dim);color:var(--green);">ALL OK</div>';

  html += '<div style="border-top:1px solid var(--border2);background:'+endBg+';padding:11px 14px;display:flex;align-items:center;justify-content:space-between;">';

  // Left — THIS PERIOD: outgoing / incoming
  html += '<div>';
  html += '<div style="font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;">This Period</div>';
  html += '<div style="display:flex;align-items:baseline;gap:6px;">';
  html += '<span style="font-size:20px;font-weight:700;color:var(--red);">'+fmtD(totalOut)+'</span>';
  html += '<span style="font-size:15px;color:var(--text-dim);">/</span>';
  html += '<span style="font-size:20px;font-weight:700;color:var(--green);">+'+fmtD(totalIn)+'</span>';
  html += '</div>';
  if (vacTot > 0) html += '<div style="font-size:11px;color:#4ade80;margin-top:2px;">✈ includes '+fmtD(vacTot)+' trip</div>';
  html += '</div>';

  // Right — Remaining balance verdict
  if (projEnd !== null) {
    html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">';
    html += '<div style="font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-dim);">Remaining</div>';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += endBadge;
    html += '<span style="font-size:20px;font-weight:700;color:'+endColor+';">'+(isNegEnd?'-':'')+fmtD(projEnd)+'</span>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  html+='<div class="period-footer">'+
    (p.active?'<button class="btn sm '+(S.ui_armAdvance?'danger':'primary')+'" onclick="advancePeriod()" title="Settles this period: clears remaining bills into the balance and moves to the next">'+(S.ui_armAdvance?'⚠ Tap again — settles & clears this period':'→ Advance to Next')+'</button>':'<button class="btn sm" onclick="setActivePeriod(\''+p.id+'\')" title="Mark this as your active pay period">Set as Current</button>')+
    '<div style="flex:1;"></div>'+
    '<button class="btn sm danger" onclick="if(confirm(\'Remove period?\'))delPeriod(\''+p.id+'\')" style="opacity:.5;">🗑️</button>'+
  '</div>';
  return '<div class="period-body">'+html+'</div>';
}

// ═══ PERIOD HANDLERS ═══
function editBal(){const d=document.getElementById('bal-display'),i=document.getElementById('bal-input');i.value=String(S.balance);d.style.display='none';i.style.display='inline-block';i.focus();i.select();}
function saveBal(){const i=document.getElementById('bal-input'),v=parseDollars(i.value);S.balance=isNaN(v)?S.balance:v;document.getElementById('bal-display').style.display='';i.style.display='none';persist();render();}
function togglePeriod(id){const p=S.periods.find(pp=>pp.id===id);if(p)p.open=!p.open;persist();render();}
function setActivePeriod(id){S.periods.forEach(p=>{p.active=p.id===id;if(p.active)p.open=true;});persist();render();}
function cycleStatus(pid,bid){const p=S.periods.find(pp=>pp.id===pid);if(!p)return;const b=p.bills.find(bb=>bb.id===bid);if(!b)return;const c=['upcoming','pending','cleared'];b.status=c[(c.indexOf(b.status)+1)%c.length];persist();render();}
function delBill(pid,bid){
  const p=S.periods.find(pp=>pp.id===pid);if(!p)return;
  const b=p.bills.find(bb=>bb.id===bid);
  if(b&&b.templateId){
    // Recurring bill — offer single vs. series delete
    _pendingDelete={pid:pid,bid:bid,tplId:b.templateId,name:b.name};
    document.getElementById('modal-root').innerHTML=
      '<div class="modal-backdrop">'+
        '<div class="modal sm"><h2>Delete Recurring Bill</h2>'+
          '<div style="font-size:14px;color:var(--text-mid);line-height:1.6;margin:4px 0 14px;"><b style="color:var(--text);">'+esc(b.name)+'</b> is a recurring bill.<br>Delete just this one, or remove the whole series from this period forward?</div>'+
          '<div class="m-actions" style="flex-wrap:wrap;gap:6px;">'+
            '<button class="btn" onclick="closeModal()">Cancel</button>'+
            '<div style="flex:1;"></div>'+
            '<button class="btn" onclick="delBillOnce()">Just this one</button>'+
            '<button class="btn danger" onclick="delBillSeries()">Delete all future</button>'+
          '</div>'+
        '</div>'+
      '</div>';
    return;
  }
  p.bills=p.bills.filter(bb=>bb.id!==bid);persist();render();
}
var _pendingDelete=null;
function delBillOnce(){
  const r=_pendingDelete;_pendingDelete=null;if(!r){closeModal();return;}
  const p=S.periods.find(pp=>pp.id===r.pid);
  if(p)p.bills=p.bills.filter(bb=>bb.id!==r.bid);
  persist();closeModal();render();
}
function delBillSeries(){
  const r=_pendingDelete;_pendingDelete=null;if(!r){closeModal();return;}
  const pi=S.periods.findIndex(pp=>pp.id===r.pid);
  // Remove from this period and every future one
  S.periods.forEach((fp,fi)=>{
    if(fi<pi)return;
    fp.bills=fp.bills.filter(bb=>!(bb.templateId===r.tplId&&(fi>pi||bb.id===r.bid)));
  });
  // Remove the template so Rebuild / new periods don't resurrect it
  S.templates=S.templates.filter(t=>t.id!==r.tplId);
  persist();closeModal();render();
}
function editBillRow(pid,bid){
  const p=S.periods.find(pp=>pp.id===pid);const b=p?.bills.find(bb=>bb.id===bid);if(!b)return;
  const pi=S.periods.findIndex(pp=>pp.id===pid);
  const activeIdx=S.periods.findIndex(pp=>pp.active);
  const nextP=pi>-1&&pi<S.periods.length-1?S.periods[pi+1]:null;
  // Previous period is only eligible if it is not closed (i.e., index >= activeIdx)
  const prevP=pi>0&&(pi-1)>=activeIdx?S.periods[pi-1]:null;
  const pushBtn=nextP
    ? '<button class="btn" style="color:var(--amber);border-color:var(--amber-dim);" data-pid="'+pid+'" data-bid="'+bid+'" data-npid="'+nextP.id+'" onclick="pushBillToNext(this.dataset.pid,this.dataset.bid,this.dataset.npid)" title="Move this bill to the next pay period">→ Next Period</button>'
    : '';
  const pullBtn=prevP
    ? '<button class="btn" style="color:var(--blue);border-color:var(--blue-dim);" data-pid="'+pid+'" data-bid="'+bid+'" data-ppid="'+prevP.id+'" onclick="pullBillToPrev(this.dataset.pid,this.dataset.bid,this.dataset.ppid)" title="Pull this bill back to the previous open period">← Prev Period</button>'
    : '';
  var periodNav='';
  if(prevP||nextP){
    periodNav='<div style="margin-top:4px;padding:8px 10px;background:var(--bg);border-radius:4px;border:1px solid var(--border);font-size:12px;color:var(--text-dim);display:flex;flex-direction:column;gap:3px;">';
    if(prevP)periodNav+='<div>← Prev (open): <span style="color:var(--blue);">'+fmtDs(prevP.startDate)+' – '+fmtDs(prevP.endDate)+'</span></div>';
    if(nextP)periodNav+='<div>→ Next: <span style="color:var(--amber);">'+fmtDs(nextP.startDate)+' – '+fmtDs(nextP.endDate)+'</span></div>';
    periodNav+='</div>';
  }
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">'+
      '<div class="modal sm"><h2>Edit Bill</h2>'+
        '<span class="m-lbl">Name</span>'+
        '<input class="m-input" id="eb-name" value="'+esc(b.name)+'" placeholder="Bill name">'+
        '<span class="m-lbl">Amount ($)</span>'+
        '<input class="m-input" id="eb-amount" type="number" min="0" step="0.01" value="'+b.amount+'" placeholder="0.00">'+
        '<span class="m-lbl">Due Day (blank = variable)</span>'+
        '<input class="m-input" id="eb-day" type="number" min="1" max="31" value="'+(b.day||'')+'" placeholder="1–31">'+
        '<span class="m-lbl">Link / URL (payment site, account page — optional)</span>'+
        '<input class="m-input" id="eb-url" type="url" value="'+esc(b.url||'')+'" placeholder="https://…">'+
        '<label style="display:flex;align-items:center;gap:8px;margin:2px 0 10px;cursor:pointer;font-size:13px;color:var(--text-mid);">'+
          '<input type="checkbox" id="eb-autopay" '+(b.autopay?'checked':'')+' style="accent-color:var(--amber);width:15px;height:15px;cursor:pointer;">'+
          '<span>⚡ On Autopay <span style="color:var(--text-dim);font-size:11px;">(automatically marks as Pending)</span></span>'+
        '</label>'+
        periodNav+
        '<div class="m-actions" style="flex-wrap:wrap;gap:6px;">'+
          pullBtn+
          pushBtn+
          '<div style="flex:1;"></div>'+
          '<button class="btn" onclick="closeModal()">Cancel</button>'+
          '<button class="btn primary" data-pid="'+pid+'" data-bid="'+bid+'" onclick="saveEditBill(this.dataset.pid,this.dataset.bid)">Save</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  setTimeout(function(){
    var el=document.getElementById('eb-amount');
    if(el){el.focus();el.select();}
  },50);
}
function pullBillToPrev(pid,bid,ppid){
  const p=S.periods.find(pp=>pp.id===pid);
  const prevP=S.periods.find(pp=>pp.id===ppid);
  const activeIdx=S.periods.findIndex(pp=>pp.active);
  const prevIdx=S.periods.findIndex(pp=>pp.id===ppid);
  if(!p||!prevP)return;
  // Safety guard: never allow pulling into a closed (past) period
  if(prevIdx<activeIdx){alert('Cannot pull a bill into a closed period.');return;}
  const bi=p.bills.findIndex(bb=>bb.id===bid);
  if(bi===-1)return;
  const b=p.bills[bi];
  prevP.bills.push({...b,id:uid(),status:'upcoming'});
  prevP.bills.sort((a,c)=>(a.day||99)-(c.day||99));
  p.bills.splice(bi,1);
  persist();closeModal();render();
}
function saveEditBill(pid,bid){
  const p=S.periods.find(pp=>pp.id===pid);const b=p?.bills.find(bb=>bb.id===bid);if(!b){closeModal();return;}
  const oldName=b.name;
  const n=document.getElementById('eb-name')?.value.trim();
  const a=document.getElementById('eb-amount')?.value;
  const d=document.getElementById('eb-day')?.value;
  let u=(document.getElementById('eb-url')?.value||'').trim();
  if(u&&!/^https?:\/\//i.test(u))u='https://'+u; // normalize scheme
  if(n)b.name=n;
  const av=parseFloat(a);if(!isNaN(av))b.amount=av;
  const oldDay=b.day;
  b.day=d&&d.trim()?parseInt(d):null;
  if(b.day!==oldDay)delete b.keepHere; // due day changed — let the misplaced audit re-check it
  const urlChanged=(b.url||'')!==u;
  b.url=u;
  const ap=!!document.getElementById('eb-autopay')?.checked;
  b.autopay=ap;
  if(ap&&b.status==='upcoming')b.status='pending'; // autopay bills auto-flip to Pending
  // If it's a recurring bill, offer to propagate changes forward
  if(b.templateId){
    _pendingRipple={type:'template',pid:pid,tplId:b.templateId,n:n,av:av,day:b.day,u:u,ap:ap};
    showRippleChoice('<b style="color:var(--text);">'+esc(b.name)+'</b> is a recurring bill.<br>Apply these changes to all future periods, or just this one?');
    return;
  } else if(urlChanged){
    // Non-template bill: offer to ripple the URL forward to same-named bills in future periods
    const pi=S.periods.findIndex(pp=>pp.id===pid);
    let matches=0;
    S.periods.forEach((fp,fi)=>{if(fi>pi)fp.bills.forEach(bb=>{if(bb.name===oldName||bb.name===b.name)matches++;});});
    if(matches>0){
      _pendingRipple={type:'name',pid:pid,oldName:oldName,newName:b.name,u:u};
      showRippleChoice('Apply this link to '+matches+' future <b style="color:var(--text);">'+esc(b.name)+'</b> bill'+(matches>1?'s':'')+', or just this one?');
      return;
    }
  }
  persist();closeModal();render();
}
var _pendingRipple=null;
function showRippleChoice(msgHtml){
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-backdrop">'+
      '<div class="modal sm"><h2>Apply Changes</h2>'+
        '<div style="font-size:14px;color:var(--text-mid);line-height:1.6;margin:4px 0 14px;">'+msgHtml+'</div>'+
        '<div class="m-actions" style="flex-wrap:wrap;gap:6px;">'+
          '<button class="btn" onclick="rippleJustOnce()">Just this one time</button>'+
          '<div style="flex:1;"></div>'+
          '<button class="btn primary" onclick="rippleApplyAll()">Apply to all periods</button>'+
        '</div>'+
      '</div>'+
    '</div>';
}
function rippleJustOnce(){
  _pendingRipple=null;
  persist();closeModal();render();
}
function rippleApplyAll(){
  const r=_pendingRipple;_pendingRipple=null;
  if(r){
    const pi=S.periods.findIndex(pp=>pp.id===r.pid);
    if(r.type==='template'){
      S.periods.forEach((fp,fi)=>{
        if(fi<=pi)return;
        const fb=fp.bills.find(bb=>bb.templateId===r.tplId);
        if(fb){
          if(r.n)fb.name=r.n;if(!isNaN(r.av))fb.amount=r.av;if(r.day!==null)fb.day=r.day;fb.url=r.u;
          fb.autopay=r.ap;
          if(r.ap&&fb.status==='upcoming')fb.status='pending';
          else if(!r.ap&&fb.status==='pending')fb.status='upcoming';
        }
      });
      const tplIdx=S.templates.findIndex(t=>t.id===r.tplId);
      if(tplIdx>-1){if(r.n)S.templates[tplIdx].name=r.n;if(!isNaN(r.av))S.templates[tplIdx].amount=r.av;S.templates[tplIdx].url=r.u;S.templates[tplIdx].autopay=r.ap;}
    } else if(r.type==='name'){
      S.periods.forEach((fp,fi)=>{
        if(fi<=pi)return;
        fp.bills.forEach(bb=>{if(bb.name===r.oldName||bb.name===r.newName)bb.url=r.u;});
      });
    }
  }
  persist();closeModal();render();
}
function pushBillToNext(pid,bid,npid){
  const p=S.periods.find(pp=>pp.id===pid);
  const np=S.periods.find(pp=>pp.id===npid);
  if(!p||!np)return;
  const bi=p.bills.findIndex(bb=>bb.id===bid);
  if(bi===-1)return;
  const b=p.bills[bi];
  // Add to next period
  np.bills.push({...b,id:uid(),status:'upcoming'});
  np.bills.sort((a,c)=>(a.day||99)-(c.day||99));
  // Remove from this period
  p.bills.splice(bi,1);
  persist();closeModal();render();
}
// Toggle income received status — clears income from projections (already in balance manually)
function toggleIncome(pid){
  const p=S.periods.find(pp=>pp.id===pid);if(!p)return;
  p.incomeCleared=!p.incomeCleared;
  persist();render();
}
function toggleAddlIncome(pid,idx){
  const p=S.periods.find(pp=>pp.id===pid);if(!p)return;
  const a=(p.additionalIncome||[])[idx];if(!a)return;
  a.status=a.status==='cleared'?'upcoming':'cleared';
  persist();render();
}
function showAddBillForm(pid) {
  S.ui_addBill = pid;
  render();
  setTimeout(function(){ var el=document.getElementById('ab-name-'+pid); if(el)el.focus(); }, 50);
}
function saveAddBill(pid){
  const p=S.periods.find(pp=>pp.id===pid);if(!p)return;
  const name=(document.getElementById('ab-name-'+pid)?.value||'').trim();
  const amt=parseFloat(document.getElementById('ab-amt-'+pid)?.value)||0;
  const dayEl=document.getElementById('ab-day-'+pid);
  const day=dayEl&&dayEl.value.trim()?parseInt(dayEl.value):null;
  const recurring=!!document.getElementById('ab-rec-'+pid)?.checked;
  const ap=!!document.getElementById('ab-ap-'+pid)?.checked;
  let u=(document.getElementById('ab-url-'+pid)?.value||'').trim();
  if(u&&!/^https?:\/\//i.test(u))u='https://'+u;
  const st=ap?'pending':'upcoming';
  if(!name)return;
  if(recurring){
    // Create a template and place the bill in this + every future period where the due day fits
    const tplId=uid();
    S.templates.push({id:tplId,name:name,day:day,amount:amt,active:true,category:'fixed',url:u,autopay:ap});
    const pi=S.periods.findIndex(pp=>pp.id===pid);
    let placedHere=false,firstPlaced=null,count=0;
    S.periods.forEach((fp,fi)=>{
      if(fi<pi)return;
      if(!billDueInPeriod(day,fp.startDate,fp.endDate))return;
      fp.bills.push({id:uid(),templateId:tplId,name:name,amount:amt,day:day,status:st,category:'fixed',tag:'',url:u,autopay:ap});
      fp.bills.sort((a,b)=>(a.day||99)-(b.day||99));
      count++;
      if(fi===pi)placedHere=true;
      if(!firstPlaced)firstPlaced=fp;
    });
    S.ui_addBill=null;
    persist();render();
    if(!placedHere&&firstPlaced){
      alert('"'+name+'" is recurring, but day '+day+' doesn\'t fall in this pay period — its first occurrence starts in '+fmtDs(firstPlaced.startDate)+' – '+fmtDs(firstPlaced.endDate)+'. Added to '+count+' periods total.');
    }
    return;
  }
  p.bills.push({id:uid(),templateId:null,name,amount:amt,day,status:st,category:'fixed',tag:'',url:u,autopay:ap});
  p.bills.sort((a,b)=>(a.day||99)-(b.day||99));
  S.ui_addBill=null;
  persist();render();
}

function advancePeriod(){
  const ai=S.periods.findIndex(p=>p.active);
  if(ai===-1||ai>=S.periods.length-1)return;
  if(S.ui_armAdvance!==true){ // press-again: Chrome suppresses confirm() dialogs unpredictably
    S.ui_armAdvance=true;render();
    setTimeout(function(){if(S.ui_armAdvance){S.ui_armAdvance=false;render();}},4000);
    return;
  }
  S.ui_armAdvance=false;
  const p=S.periods[ai];
  // Settle: add only non-cleared income (cleared was already manually folded in), subtract non-cleared bills
  S.balance=Math.round(S.balance+periodIncomeTotal(p)-periodBillsTotal(p));
  p.active=false;p.open=false;
  p.bills.forEach(b=>{if(b.status!=='cleared')b.status='cleared';});
  S.periods[ai+1].active=true;S.periods[ai+1].open=true;
  persist();render();
}

function addTpl(raw){
  const pts=raw.split(':');const name=(pts[0]||'').trim(),amt=parseDollars(pts[1]||'0'),day=pts[2]?parseInt(pts[2].trim()):null;
  if(!name||!amt){alert('Format: Name : Amount : Day');return;}

function rebuildFuture(){
  if(!confirm('Rebuild future periods from your bill templates? One-off bills are kept.'))return;
  const ai=S.periods.findIndex(p=>p.active);
  S.periods.forEach((p,i)=>{
    if(i<=ai)return;
    const nb=buildBillsForPeriod(p);
    const rebuilt=nb.map(b=>{const ex=p.bills.find(e=>e.templateId&&e.templateId===b.templateId);return ex?{...b,status:ex.status,url:ex.url||b.url,keepHere:ex.keepHere}:b;});
    const oneOffs=p.bills.filter(e=>!e.templateId); // preserve one-offs untouched
    p.bills=rebuilt.concat(oneOffs).sort((a,c)=>(a.day||99)-(c.day||99));
  });
  persist();closeManage();render();
}

// ═══ DEBT COLLECTOR ═══
function calcMonthlyInt(bal,apr){return Math.round(bal*(apr/100/365)*30*100)/100;}
function calcPayoffMonths(bal,apr,mp){
  if(mp<=0)return Infinity;
  const mr=apr/100/12;
  if(mr===0)return Math.ceil(bal/mp);
  if(mp<=bal*mr)return Infinity;
  return Math.ceil(-Math.log(1-(bal*mr)/mp)/Math.log(1+mr));
}
function fmtMonths(m){if(!isFinite(m))return '∞';if(m<12)return m+'mo';return Math.floor(m/12)+'y '+(m%12)+'mo';}
function nextDueDate(dueDay){
  const now=new Date();let d=new Date(now.getFullYear(),now.getMonth(),dueDay);
  if(d<=now)d=new Date(now.getFullYear(),now.getMonth()+1,dueDay);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function utilClass(b,l){if(!l)return 'ok';const p=b/l*100;if(p>=90)return 'maxed';if(p>=70)return 'high';return 'ok';}
function utilPct(b,l){if(!l)return '';return Math.round(b/l*100)+'%';}
function utilColor(b,l){const c=utilClass(b,l);return c==='maxed'?'var(--red)':c==='high'?'var(--amber)':'var(--green)';}

function getAvalanche(){return [...DC.cards].sort((a,b)=>(b.apr||26)-(a.apr||26));}
function avalancheRank(card){return getAvalanche().findIndex(c=>c.id===card.id)+1;}

function renderDebt(){
  const el=document.getElementById('tab-debt');if(!el)return;
  const cards=DC.cards;
  const totBal=cards.reduce((s,c)=>s+(c.balance||0),0);
  const totLim=cards.reduce((s,c)=>s+(c.limit||0),0);
  const totMin=cards.reduce((s,c)=>s+(c.minPayment||0),0);
  const totInt=cards.reduce((s,c)=>s+calcMonthlyInt(c.balance||0,c.apr||26),0);
  const av=getAvalanche();
  let html='';

  // Summary
  html+='<div class="dc-stat-row">'+
    '<div class="stat"><div class="stat-lbl">Total Debt</div><div class="stat-val neg">-'+fmtD(totBal)+'</div></div>'+
    (totLim?'<div class="stat"><div class="stat-lbl">Total Limit</div><div class="stat-val neu">'+fmtD(totLim)+'</div></div>':'')+
    '<div class="stat"><div class="stat-lbl">Monthly Mins</div><div class="stat-val amber">-'+fmtD(totMin)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Monthly Interest</div><div class="stat-val neg">+'+fmtD(totInt)+'</div></div>'+
  '</div>';

  // Avalanche order
  if(av.length>1){
    html+='<div class="dc-avalanche">⚡ <strong style="color:var(--text-mid);">Avalanche order (highest APR first):</strong> '+
      av.map((c,i)=>'<span style="color:'+(i===0?'var(--red)':'var(--text-mid)')+';">'+esc(c.name)+' <span style="color:var(--text-dim);">('+( c.apr||26)+'%)</span></span>').join(' → ')+'</div>';
  }

  // Cards
  cards.forEach(function(card){
    const bal=card.balance||0, lim=card.limit||0, apr=card.apr||26;
    const interest=calcMonthlyInt(bal,apr);
    const nextBal=bal+interest;
    const payoffMo=calcPayoffMonths(bal,apr,card.minPayment||0);
    const uCls=utilClass(bal,lim);
    const isOpen=card.open;
    const rank=avalancheRank(card);

    html+='<div class="dc-card '+uCls+(isOpen?' open':'')+'" id="dcc-'+card.id+'">'+
      '<div class="dc-card-hdr" onclick="dcToggle(\''+card.id+'\')">'+
        (rank===1&&cards.length>1?'<span style="color:var(--red);margin-right:2px;" title="Avalanche #1 — pay this first">🎯</span>':'')+
        '<div class="dc-card-name">'+(card.url?'<a class="bill-link" href="'+esc(card.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="'+esc(card.url)+'">'+esc(card.name)+' <span style="font-size:11px;">↗</span></a>':esc(card.name))+'</div>'+
        '<div class="dc-int">+'+fmtD(interest)+' on '+nextDueDate(card.dueDay||1)+'</div>'+
        (lim?'<div class="dc-util '+uCls+'">'+utilPct(bal,lim)+'</div>':'')+
        '<div class="dc-bal">-'+fmtD(bal)+'</div>'+
        '<div style="font-size:12px;color:var(--text-dim);margin-left:4px;">▾</div>'+
      '</div>';

    if(lim){const pct=Math.min(bal/lim*100,100);html+='<div class="dc-bar-wrap"><div class="dc-bar-fill" style="width:'+pct+'%;background:'+utilColor(bal,lim)+';"></div></div>';}

    if(isOpen){
      html+='<div class="dc-body">'+
        '<div class="dc-grid">'+
          '<div class="dc-field"><div class="dc-label">Current Balance</div><input class="dc-input" type="number" value="'+bal+'" min="0" step="0.01" data-cid="'+card.id+'" data-field="balance" onchange="dcUpdate(this.dataset.cid,this.dataset.field,parseFloat(this.value)||0)"></div>'+
          '<div class="dc-field"><div class="dc-label">Credit Limit</div><input class="dc-input" type="number" value="'+(lim||'')+'" min="0" data-cid="'+card.id+'" data-field="limit" onchange="dcUpdate(this.dataset.cid,this.dataset.field,parseFloat(this.value)||0)"></div>'+
          '<div class="dc-field"><div class="dc-label">APR %</div><input class="dc-input" type="number" value="'+apr+'" min="0" max="100" step="0.1" data-cid="'+card.id+'" data-field="apr" onchange="dcUpdate(this.dataset.cid,this.dataset.field,parseFloat(this.value)||26)"></div>'+
          '<div class="dc-field"><div class="dc-label">Due Day</div><input class="dc-input" type="number" value="'+(card.dueDay||1)+'" min="1" max="31" data-cid="'+card.id+'" data-field="dueDay" onchange="dcUpdate(this.dataset.cid,this.dataset.field,parseInt(this.value)||1)"></div>'+
          '<div class="dc-field"><div class="dc-label">Min Payment</div><input class="dc-input" type="number" value="'+(card.minPayment||'')+'" min="0" step="0.01" data-cid="'+card.id+'" data-field="minPayment" onchange="dcUpdate(this.dataset.cid,this.dataset.field,parseFloat(this.value)||0)"></div>'+
          '<div class="dc-field"><div class="dc-label">Payoff @ Min</div><div class="dc-val" style="color:'+(isFinite(payoffMo)?'var(--amber)':'var(--red)')+';">'+fmtMonths(payoffMo)+'</div></div>'+
          '<div class="dc-field" style="grid-column:1/-1;"><div class="dc-label">Link / URL (card login or payment page)</div><input class="dc-input" type="url" value="'+esc(card.url||'')+'" placeholder="https://…" data-cid="'+card.id+'" onchange="dcUpdateUrl(this.dataset.cid,this.value)"></div>'+
        '</div>'+
        '<div class="dc-proj">'+
          '<span style="color:var(--text-dim);">Next statement (~'+nextDueDate(card.dueDay||1)+'):</span> '+
          '<span>'+fmtD(bal)+'</span> '+
          '<span style="color:var(--text-dim);">+ '+apr+'% → </span>'+
          '<span style="color:var(--red);">+'+fmtD(interest)+'</span> = '+
          '<span style="color:var(--amber);font-weight:600;">'+fmtD(nextBal)+'</span>'+
          (card.minPayment?'<br><span style="font-size:13px;color:var(--text-dim);">After min payment: </span><span style="font-size:13px;color:var(--text-mid);">'+fmtD(Math.max(0,nextBal-card.minPayment))+'</span>':'')+
        '</div>'+
        '<div class="dc-actions">'+
          '<button class="btn sm primary" data-cid="'+card.id+'" onclick="dcSpent(this.dataset.cid)">+ Spent</button>'+
          '<button class="btn sm" data-cid="'+card.id+'" onclick="dcPayModal(this.dataset.cid)">💳 Pay</button>'+
          '<button class="btn sm" data-cid="'+card.id+'" onclick="dcMoveUp(this.dataset.cid)">↑</button>'+
          '<button class="btn sm" data-cid="'+card.id+'" onclick="dcMoveDown(this.dataset.cid)">↓</button>'+
          '<button class="btn sm danger" data-cid="'+card.id+'" onclick="dcDel(this.dataset.cid)">🗑️</button>'+
        '</div>';

      // Scheduled payments tracker
      if(card.scheduledPayments&&card.scheduledPayments.length){
        html+='<div style="border-top:1px solid var(--border);padding:10px 14px;background:var(--bg);">';
        html+='<div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Scheduled Payments</div>';
        card.scheduledPayments.forEach(function(sp,si){
          var isDone=S.periods.find(function(p){return p.id===sp.periodId&&p.bills.some(function(b){return b.tag==='cc-payment'&&b.name.indexOf(card.name)>-1&&b.status==='cleared';});});
          html+='<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;">';
          html+='<span style="color:'+(isDone?'var(--green)':'var(--text-dim)')+';">'+(isDone?'✓':'○')+'</span>';
          html+='<span style="color:var(--text-mid);">'+sp.periodLabel+'</span>';
          html+='<span style="color:var(--green);margin-left:auto;">'+fmtD(sp.amount)+'</span>';
          html+='<button class="btn sm danger" style="padding:1px 5px;font-size:11px;" data-cid="'+card.id+'" data-si="'+si+'" onclick="dcRemovePayment(this.dataset.cid,this.dataset.si)">✕</button>';
          html+='</div>';
        });
        html+='</div>';
      }

      html+='</div>';
    }
    html+='</div>';
  });

  html+='<button class="btn primary" style="margin-top:12px;" onclick="dcAddModal()">＋ Add Card</button>';
  el.innerHTML=html;
}

// Find all future periods where a given due day falls within that period
function dcGetEligiblePeriods(dueDay){
  var result=[];
  var activeIdx=S.periods.findIndex(function(p){return p.active;});
  S.periods.forEach(function(p,i){
    if(i<activeIdx)return;
    var sd=new Date(p.startDate+'T00:00:00');
    var ed=new Date(p.endDate+'T00:00:00');
    var d=new Date(sd.getFullYear(),sd.getMonth(),dueDay);
    if(d<sd)d=new Date(sd.getFullYear(),sd.getMonth()+1,dueDay);
    if(d>=sd&&d<=ed)result.push({p:p,i:i});
  });
  return result;
}

function dcSavePay(id){

function dcRemovePayment(id,si){
  var c=DC.cards.find(c=>c.id===id);if(!c||!c.scheduledPayments)return;

function renderViz() {
  var el = document.getElementById('tab-viz');
  if (!el) return;

  var bals = getRunningBals();
  var activeIdx = S.periods.findIndex(function(p){ return p.active; });

  var display = [];
  S.periods.forEach(function(p, i) {
    if (i < activeIdx) return;
    var b = bals[i];
    if (!b) return;
    display.push({ p: p, i: i, end: b.end });
  });

  function tierFor(v) {
    if (v < 0)    return { fill:'#f87171', label:'NEG',    title:'Negative' };
    if (v < 500)  return { fill:'#fbbf24', label:'<$500',  title:'Under $500' };
    if (v < 1000) return { fill:'#d97706', label:'<$1k',   title:'Under $1k' };
    if (v < 2500) return { fill:'#4ade80', label:'OK',     title:'$1k–$2.5k' };
    return              { fill:'#86efac', label:'GOOD',   title:'$2.5k+' };
  }

  // Legend
  html += '<div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;">';
  [{fill:'#f87171',label:'Negative'},{fill:'#fbbf24',label:'< $500'},
   {fill:'#d97706',label:'< $1k'},{fill:'#4ade80',label:'< $2.5k'},{fill:'#86efac',label:'$2.5k+'}

    html += '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);">' +
      '<div style="width:12px;height:12px;border-radius:2px;background:'+t.fill+';"></div>' + t.label + '</div>';
  });
  html += '</div>';

  // Single horizontal timeline strip
  html += '<div style="display:flex;width:100%;height:20px;border-radius:3px;overflow:hidden;gap:1px;margin-bottom:10px;">';
  display.forEach(function(d) {
    var t = tierFor(d.end);
    var hasVac = d.p.bills && d.p.bills.some(function(b){ return b.tag==='vacation'; });
    var isActive = d.p.active;
    var tooltip = fmtDs(d.p.startDate) + ' – ' + fmtDs(d.p.endDate) + ' · ' + fmtD(d.end) + (hasVac ? ' ✈' : '');
    html += '<div data-pid="'+d.p.id+'" onclick="jumpToPeriod(event,this.dataset.pid)" title="'+tooltip+'" style="'+
      'flex:1;min-width:0;background:'+t.fill+';opacity:'+(isActive?'1':'0.75')+';cursor:pointer;position:relative;'+
      (isActive?'box-shadow:inset 0 0 0 2px #fff;':'')+
      (hasVac?'background:repeating-linear-gradient(45deg,'+t.fill+','+t.fill+' 4px,rgba(96,165,250,.4) 4px,rgba(96,165,250,.4) 8px);':'')+
      '"></div>';
  });
  html += '</div>';

  // Date markers below — just a few key ones
  html += '<div style="display:flex;width:100%;font-size:10px;color:var(--text-dim);margin-bottom:16px;position:relative;height:12px;">';
  display.forEach(function(d, idx) {
    // Only label every ~6th period or key ones
    if (idx % 6 === 0 || d.p.active) {
      var leftPct = (idx / display.length * 100).toFixed(1);
      html += '<div style="position:absolute;left:'+leftPct+'%;transform:translateX(-50%);">'+
        d.p.startDate.slice(5).replace('-','/')+'</div>';
    }
  });
  html += '</div>';

  // Hover detail area
  html += '<div id="viz-detail" style="min-height:40px;font-size:13px;color:var(--text-dim);padding:8px 12px;background:var(--surface);border-radius:4px;border:1px solid var(--border);">' +
    'Hover a segment to see details · Click to jump to that period' +
  '</div>';



  // Summary counts
  var neg  = display.filter(function(d){ return d.end < 0; }).length;
  var warn = display.filter(function(d){ return d.end >= 0 && d.end < 500; }).length;
  var low  = display.filter(function(d){ return d.end >= 500 && d.end < 1000; }).length;
  var ok   = display.filter(function(d){ return d.end >= 1000; }).length;

  html += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;">';
  if (neg)  html += '<div style="font-size:12px;color:#f87171;">'+neg+' negative</div>';
  if (warn) html += '<div style="font-size:12px;color:#fbbf24;">'+warn+' under $500</div>';
  if (low)  html += '<div style="font-size:12px;color:#d97706;">'+low+' under $1k</div>';
  if (ok)   html += '<div style="font-size:12px;color:#4ade80;">'+ok+' healthy</div>';
  html += '</div>';

  html += '</div>';
  el.innerHTML = html;

  // Wire up mouseover after render
  var segs = el.querySelectorAll('[data-pid]');
  var detail = document.getElementById('viz-detail');
  segs.forEach(function(seg) {
    seg.addEventListener('mouseover', function() {
      var pid = seg.dataset.pid;
      var found = null;
      display.forEach(function(d){ if (d.p.id === pid) found = d; });
      if (!found || !detail) return;
      var t = tierFor(found.end);
      var hasVac = found.p.bills && found.p.bills.some(function(b){ return b.tag==='vacation'; });
      detail.innerHTML =
        '<span style="color:'+t.fill+';font-weight:600;">'+fmtDs(found.p.startDate)+' – '+fmtDs(found.p.endDate)+'</span>' +
        ' &nbsp;·&nbsp; End: <span style="color:'+t.fill+';font-weight:600;">'+fmtD(found.end)+'</span>' +
        (hasVac ? ' &nbsp;<span style="color:rgba(96,165,250,.8);">✈ trip period</span>' : '') +
        ' &nbsp;·&nbsp; <span style="opacity:.6;">click to open</span>';
    });
    seg.addEventListener('mouseout', function() {
      if (detail) detail.innerHTML = 'Hover a segment to see details · Click to jump to that period';
    });
  });
}

function syncPushNow(){
  if(!SYNC.ref)return;
  SYNC.localStamp=Date.now();

  var payload=JSON.parse(JSON.stringify({updatedAt:SYNC.localStamp,clientId:SYNC.clientId,balance:S.balance,templates:S.templates,periods:S.periods,dc:DC.cards,subtitle:S.subtitle||''}));
  SYNC.ref.set(payload).then(function(){syncSetStatus('synced');}).catch(function(e){syncSetStatus('error',e.message);});

function syncQueuePush(){
  if(!SYNC.ref||SYNC.applying)return;
  syncSetStatus('connecting');
  clearTimeout(SYNC.debounce);
  var wait=(SYNC.resumeHold&&Date.now()-SYNC.resumeHold<4000)?(4000-(Date.now()-SYNC.resumeHold)+300):700;
  SYNC.debounce=setTimeout(syncPushNow,wait);
}
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){SYNC.resumeHold=Date.now();}
});
function syncInit(){
  if(!SYNC.cfg||!SYNC.code){syncSetStatus('off');return;}
  if(typeof firebase==='undefined'){syncSetStatus('error','Firebase SDK didn\'t load (offline?) — changes are saved locally and will need a reload to sync');return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(SYNC.cfg);
    if(SYNC.ref)SYNC.ref.off();
    SYNC.ref=firebase.database().ref('ledgers/'+SYNC.code);
    syncSetStatus('connecting');
    SYNC.ref.on('value',function(snap){
      var v=snap.val();
      if(v===null){syncPushNow();return;} // cloud empty — seed it with this device's data
      SYNC.resumeHold=null; // fresh snapshot received — safe to push
      if(v.clientId===SYNC.clientId&&(v.updatedAt||0)<=SYNC.localStamp){syncSetStatus('synced');return;} // echo of our own write
      if((v.updatedAt||0)>SYNC.localStamp){syncApplyRemote(v);}
      else if((v.updatedAt||0)<SYNC.localStamp){syncPushNow();return;}
      syncSetStatus('synced');
    },function(err){syncSetStatus('error',err.message);});
  }catch(e){syncSetStatus('error',e.message);}
}

  if(dbUrl)cfg.databaseURL=dbUrl;
  if(!cfg.apiKey||!cfg.databaseURL)cfg=DEFAULT_FB_CONFIG; // built in — most people only need the code
  var code=(document.getElementById('sy-code')?.value||'').trim().toLowerCase(); // case-insensitive: phones auto-capitalize
  if(!code||code.length<8){alert('Sync code must be at least 8 characters — use 🎲 Generate for a strong one.');return;}
  if(code!==SYNC.code){
    // Connecting to a (new or different) code: defer to whatever the cloud already has.
    SYNC.localStamp=0;
    localStorage.setItem('heath_sync_stamp','0');
  }
  SYNC.cfg=cfg;SYNC.code=code;
  localStorage.setItem('heath_sync',JSON.stringify({cfg:SYNC.cfg,code:SYNC.code}));
  closeModal();
  syncInit();
}
function syncDisconnect(){
  if(!confirm('Disconnect sync on this device? Cloud data stays put; this device just stops syncing.'))return;
  if(SYNC.ref)SYNC.ref.off();
  SYNC.ref=null;SYNC.cfg=null;SYNC.code=null;
  localStorage.removeItem('heath_sync');
  syncSetStatus('off');
  closeModal();
}
// Hook sync into every save
var _origPersist=persist, _origDcPersist=dcPersist;
persist=function(){_origPersist();syncQueuePush();};
dcPersist=function(){_origDcPersist();syncQueuePush();};
// Push any pending changes before the tab closes
window.addEventListener('beforeunload',function(){if(SYNC.debounce){clearTimeout(SYNC.debounce);syncPushNow();}});

// ═══ SELF-UPDATE CHECK ═══
var HEATH_BUILD="2026-07-03-F";
function checkForUpdate(){
  try{
    fetch(location.pathname+'?u='+Date.now(),{cache:'no-store'}).then(function(r){return r.text();}).then(function(txt){
      var m=txt.match(/HEATH_BUILD="2026-07-03-F"]+)"/);
      if(m&&m[1]!==HEATH_BUILD)showUpdateBanner();
    }).catch(function(){});
  }catch(e){}
}
function showUpdateBanner(){
  if(document.getElementById('upd-banner'))return;
  var d=document.createElement('div');
  d.id='upd-banner';
  d.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--green);color:#08140a;padding:11px 20px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 6px 22px rgba(0,0,0,.55);font-family:var(--mono);';
  d.textContent='↻ Update available — tap to refresh';
  d.onclick=function(){location.href=location.pathname+'?v='+Date.now();};
  document.body.appendChild(d);
}
setTimeout(checkForUpdate,4000);
setInterval(checkForUpdate,15*60*1000);
document.addEventListener('visibilitychange',function(){if(!document.hidden)checkForUpdate();});

// Offline shell (service worker) — fails silently if sw.js isn't deployed
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js');}catch(e){}}
// Boot sync
syncLoadSettings();
syncInit();
</script>
